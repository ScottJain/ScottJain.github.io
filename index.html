<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CYBER SHOP</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>

@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Orbitron',sans-serif;
    background:
        radial-gradient(circle at top,#1a0033,#05010a 60%);
    color:#00f7ff;
    min-height:100vh;
    overflow-x:hidden;
}

/* ===== Scrollbar ===== */

::-webkit-scrollbar{
    width:10px;
}

::-webkit-scrollbar-thumb{
    background:#00f7ff;
    border-radius:999px;
}

/* ===== Background FX ===== */

body::before{
    content:"";

    position:fixed;
    inset:0;

    background:
        repeating-linear-gradient(
            transparent,
            transparent 40px,
            rgba(255,255,255,0.02) 41px
        );

    pointer-events:none;
}

/* ===== Header ===== */

header{
    position:sticky;
    top:0;
    z-index:1000;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:20px 40px;

    background:rgba(0,0,0,0.5);
    backdrop-filter:blur(15px);

    border-bottom:
        1px solid rgba(0,247,255,0.3);

    box-shadow:
        0 0 20px rgba(0,247,255,0.3);
}

header h2{
    font-size:32px;
    letter-spacing:4px;

    text-shadow:
        0 0 10px #00f7ff,
        0 0 20px #00f7ff;
}

.cart-icon{
    background:#0f172a;
    padding:12px 22px;
    border-radius:999px;

    border:1px solid #00f7ff;

    box-shadow:
        0 0 12px #00f7ff;
}

/* ===== Layout ===== */

.container{
    display:flex;
    gap:25px;
    padding:30px;
}

/* ===== Products ===== */

.products{
    flex:3;

    display:grid;
    grid-template-columns:
        repeat(auto-fill,minmax(250px,1fr));

    gap:25px;
}

/* ===== Product Card ===== */

.product{
    background:
        rgba(10,10,20,0.8);

    border:
        1px solid rgba(0,247,255,0.3);

    border-radius:24px;

    overflow:hidden;

    position:relative;

    transition:0.35s;

    box-shadow:
        0 0 20px rgba(0,247,255,0.15);
}

.product::before{
    content:"";

    position:absolute;
    inset:0;

    background:
        linear-gradient(
            135deg,
            transparent,
            rgba(0,247,255,0.08),
            transparent
        );

    pointer-events:none;
}

.product:hover{
    transform:
        translateY(-10px)
        scale(1.02);

    box-shadow:
        0 0 30px #00f7ff,
        0 0 60px rgba(0,247,255,0.3);
}

.product img{
    width:100%;
    height:240px;
    object-fit:cover;

    filter:
        saturate(1.2)
        contrast(1.1);
}

.product-content{
    padding:20px;
}

.product h4{
    font-size:22px;
    margin-bottom:12px;

    color:#fff;

    text-shadow:
        0 0 10px #ff00ff;
}

.product p{
    font-size:24px;
    color:#00ff88;
    margin-bottom:18px;

    text-shadow:
        0 0 10px #00ff88;
}

/* ===== Sidebar ===== */

.sidebar{
    flex:1;

    background:
        rgba(10,10,20,0.9);

    border:
        1px solid rgba(255,0,255,0.3);

    border-radius:24px;

    padding:25px;

    height:fit-content;

    position:sticky;
    top:100px;

    box-shadow:
        0 0 30px rgba(255,0,255,0.15);
}

.sidebar h3{
    margin-bottom:15px;
    color:#ff00ff;

    text-shadow:
        0 0 10px #ff00ff;
}

.sidebar hr{
    border:none;
    border-top:
        1px solid rgba(255,255,255,0.1);

    margin:25px 0;
}

/* ===== Inputs ===== */

input{
    width:100%;
    padding:14px;
    margin-bottom:12px;

    background:#050816;

    border:
        1px solid rgba(0,247,255,0.25);

    border-radius:14px;

    color:white;

    font-family:'Orbitron',sans-serif;

    transition:0.25s;
}

input:focus{
    outline:none;

    border-color:#00f7ff;

    box-shadow:
        0 0 15px #00f7ff;
}

/* ===== Buttons ===== */

button{
    width:100%;
    padding:14px;

    border:none;
    border-radius:14px;

    background:
        linear-gradient(
            135deg,
            #ff00ff,
            #00f7ff
        );

    color:white;

    font-family:'Orbitron',sans-serif;
    font-weight:bold;

    cursor:pointer;

    transition:0.3s;

    text-transform:uppercase;

    letter-spacing:2px;
}

button:hover{
    transform:
        translateY(-3px)
        scale(1.03);

    box-shadow:
        0 0 20px #00f7ff,
        0 0 40px #ff00ff;
}

/* ===== Cart ===== */

.cart-item{
    background:
        rgba(255,255,255,0.03);

    border:
        1px solid rgba(255,255,255,0.08);

    padding:14px;

    border-radius:16px;

    margin-bottom:12px;
}

.cart-item button{
    width:auto;
    padding:4px 10px;
    margin-left:5px;
}

/* ===== Total ===== */

#total{
    color:#00ff88;

    font-size:30px;

    text-shadow:
        0 0 15px #00ff88;
}

/* ===== Mobile ===== */

@media(max-width:900px){

.container{
    flex-direction:column;
}

.sidebar{
    position:static;
}

header{
    padding:20px;
}

header h2{
    font-size:24px;
}

}

</style>
</head>

<body>

<header>
    <h2>⚡ CYBER SHOP</h2>

    <div class="cart-icon">
        🛒 <span id="cart-count">0</span>
    </div>
</header>

<div class="container">

    <!-- 商品區 -->
    <div class="products" id="product-list"></div>

    <!-- 側邊欄 -->
    <div class="sidebar">

        <h3>新增商品</h3>

        <input id="name" placeholder="商品名稱">
        <input id="price" placeholder="價格">
        <input id="img" placeholder="圖片網址">

        <button onclick="addProduct()">
            ADD PRODUCT
        </button>

        <hr>

        <h3>購物車</h3>

        <div id="cart-items"></div>

        <h4>
            TOTAL:
            NT$ <span id="total">0</span>
        </h4>

        <br>

        <button onclick="clearCart()">
            CLEAR CART
        </button>

        <hr>

        <h3>訂單資料</h3>

        <input id="buyerName" placeholder="姓名">
        <input id="buyerPhone" placeholder="電話">
        <input id="buyerAddress" placeholder="地址">

        <button onclick="checkout()">
            CHECKOUT
        </button>

    </div>

</div>

<script>

/* ===== 資料 ===== */

let products =
    JSON.parse(localStorage.getItem("products")) || [

    {
        name:"Cyber Headset",
        price:3990,
        img:"https://images.unsplash.com/photo-1546435770-a3e426bf472b?q=80&w=1200"
    },

    {
        name:"Neon Keyboard",
        price:2490,
        img:"https://images.unsplash.com/photo-1511467687858-23d96c32e4ae?q=80&w=1200"
    },

    {
        name:"Future Mouse",
        price:1290,
        img:"https://images.unsplash.com/photo-1527814050087-3793815479db?q=80&w=1200"
    }

];

let cart =
    JSON.parse(localStorage.getItem("cart")) || [];

/* ===== 商品 ===== */

function renderProducts(){

    const el =
        document.getElementById("product-list");

    el.innerHTML = "";

    products.forEach((p,index)=>{

        el.innerHTML += `

        <div class="product">

            <img src="${p.img}">

            <div class="product-content">

                <h4>${p.name}</h4>

                <p>NT$ ${p.price}</p>

                <button onclick="addToCart(${index})">
                    BUY NOW
                </button>

            </div>

        </div>

        `;
    });

}

/* ===== 新增商品 ===== */

function addProduct(){

    const name =
        document.getElementById("name").value;

    const price =
        document.getElementById("price").value;

    const img =
        document.getElementById("img").value;

    if(!name || !price || !img){

        alert("請填寫完整！");
        return;
    }

    products.push({

        name,
        price:Number(price),
        img

    });

    localStorage.setItem(
        "products",
        JSON.stringify(products)
    );

    renderProducts();

    document.getElementById("name").value = "";
    document.getElementById("price").value = "";
    document.getElementById("img").value = "";
}

/* ===== 加入購物車 ===== */

function addToCart(index){

    const product = products[index];

    const item =
        cart.find(i=>i.name===product.name);

    if(item){

        item.qty++;

    }else{

        cart.push({
            ...product,
            qty:1
        });

    }

    saveCart();
}

/* ===== 儲存購物車 ===== */

function saveCart(){

    localStorage.setItem(
        "cart",
        JSON.stringify(cart)
    );

    renderCart();
}

/* ===== 顯示購物車 ===== */

function renderCart(){

    const el =
        document.getElementById("cart-items");

    el.innerHTML = "";

    let total = 0;
    let count = 0;

    cart.forEach((item,index)=>{

        total += item.price * item.qty;
        count += item.qty;

        el.innerHTML += `

        <div class="cart-item">

            ${item.name}

            <br><br>

            x ${item.qty}

            — NT$ ${item.price * item.qty}

            <br><br>

            <button onclick="changeQty(${index},-1)">
                -
            </button>

            <button onclick="changeQty(${index},1)">
                +
            </button>

        </div>

        `;
    });

    document.getElementById("total").innerText =
        total;

    document.getElementById("cart-count").innerText =
        count;
}

/* ===== 修改數量 ===== */

function changeQty(index,change){

    cart[index].qty += change;

    if(cart[index].qty <= 0){

        cart.splice(index,1);
    }

    saveCart();
}

/* ===== 清空購物車 ===== */

function clearCart(){

    cart = [];

    saveCart();
}

/* ===== 結帳 ===== */

function checkout(){

    const name =
        document.getElementById("buyerName").value;

    const phone =
        document.getElementById("buyerPhone").value;

    const address =
        document.getElementById("buyerAddress").value;

    if(!name || !phone || !address){

        alert("請填寫完整資料！");
        return;
    }

    if(cart.length === 0){

        alert("購物車是空的！");
        return;
    }

    const order = {

        name,
        phone,
        address,

        cart,

        total:
            cart.reduce(
                (sum,i)=>sum+i.price*i.qty,
                0
            ),

        time:
            new Date().toLocaleString()
    };

    console.log("訂單:",order);

    alert("訂單已送出 ⚡");

    cart = [];

    saveCart();
}

/* ===== 初始化 ===== */

renderProducts();
renderCart();

</script>

</body>
</html>
